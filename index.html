<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Настройка билета</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="setup-page">
    <main class="setup-shell">
      <section class="setup-card">
        <h1 class="setup-title">Поехали!</h1>
        <form class="setup-form" id="ticket-form" action="ticket.html">
          <label class="field">
            <span class="field-label">Откуда</span>
            <input class="field-input" id="from" name="from" type="text" placeholder="Девяткино" autocomplete="off">
          </label>

          <label class="field">
            <span class="field-label">Куда</span>
            <input class="field-input" id="to" name="to" type="text" placeholder="Кавголово" autocomplete="off">
          </label>

          <label class="field">
            <span class="field-label">Дата</span>
            <input class="field-input" id="date" name="date" type="date">
          </label>

          <label class="field">
            <span class="field-label">Номер</span>
            <input class="field-input" id="number" name="number" type="text" value="№ ПД 361339070" autocomplete="off">
          </label>

          <label class="field">
            <span class="field-label">GIF</span>
            <select class="field-input field-select" id="animation-gif" name="animationGif">
              <option value="qr_spin_1000.gif">qr_spin_1000</option>
              <option value="qr_spin_1100.gif">qr_spin_1100</option>
              <option value="qr_spin_1200.gif">qr_spin_1200</option>
              <option value="qr_spin_1300.gif">qr_spin_1300</option>
              <option value="qr_spin_1400.gif">qr_spin_1400</option>
              <option value="qr_spin_1500.gif" selected>qr_spin_1500</option>
              <option value="qr_spin_1600.gif">qr_spin_1600</option>
              <option value="qr_spin_1700.gif">qr_spin_1700</option>
              <option value="qr_spin_1800.gif">qr_spin_1800</option>
              <option value="qr_spin_1900.gif">qr_spin_1900</option>
              <option value="qr_spin_2000.gif">qr_spin_2000</option>
            </select>
          </label>

          <button class="primary-button" type="submit">Билет</button>
        </form>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
